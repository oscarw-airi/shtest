        function parseCSV(text) {
            const result = [];
            const lines = text.split(/\r?\n/);
            for (let line of lines) {
                const row = [];
                let inQuotes = false;
                let val = "";
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { row.push(val.trim()); val = ""; }
                    else val += char;
                }
                row.push(val.trim());
                result.push(row);
            }
            return result;
        }

        const parseNumber = (val) => {
            if (!val || val === '-' || val === '#N/A' || val === 'no data atm' || val === '#DIV/0!') return 0;
            const clean = String(val).replace(/,/g, '').replace(/%/g, '').replace(/\$/g, '').replace(/¥/g, '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        }

        const formatShortCurrency = (val) => {
            if (val === undefined || isNaN(val)) return '-';
            const num = Math.abs(val);
            if (num >= 1000000) return (val < 0 ? '-$' : '$') + (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (val < 0 ? '-$' : '$') + (num / 1000).toFixed(1) + 'K';
            return (val < 0 ? '-$' : '$') + num.toLocaleString();
        };

        const formatShortCurrency2Decimals = (val) => {
            if (val === undefined || isNaN(val)) return '-';
            const num = Math.abs(val);
            if (num >= 1000000) return (val < 0 ? '-$' : '$') + (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (val < 0 ? '-$' : '$') + (num / 1000).toFixed(2) + 'K';
            return (val < 0 ? '-$' : '$') + num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        const formatDateToYMD = (dateObj) => {
            if (!dateObj) return '';
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            const timeStr = dateObj.toLocaleTimeString('zh-HK', { hour12: false });
            return `${y}年${m}月${d}日 ${timeStr}`;
        };

        // Fix: Added the 'row' parameter to the function signature

            const num = parseFloat(val);
            if (isNaN(num)) return { className: 'text-gray-800' };

            let className = 'text-gray-900 font-medium ';
            let style = {};

            if (colName === '分發點總數') {
                if (num > 200) className += 'bg-green-200';
                else if (num >= 150) className += 'bg-yellow-200';
                else if (num >= 80) className += 'bg-orange-200';
                else className += 'bg-red-200';
            }
            else if (colName === '3天增加' || colName === '生日 Giftcard 三天增加' || colName === 'Plasma Giftcard 三天增加') {
                if (num > 0) className += 'bg-green-200';
                else if (num < 0) className += 'bg-red-200';
            }
            else if (colName === '未來 ICB Booking' || colName === '昨天SHOW' || colName === '昨天SHOW (ICB)') {
                if (num > 25) className += 'bg-green-200';
                else if (num >= 15) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === '體驗療程開單(今天)' || colName === '今天 PT QTY' || colName === '套餐 (Package)開單(今天)' || colName === '今天 Full course' || colName === '生日 Giftcard Book' || colName === 'Plasma Giftcard Book') {
                if (num >= 3) className += 'bg-green-200';
                else if (num >= 1) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === 'MTD%') {

                const sales = row ? (row.totalSalesMonth || 0) : 0;

                    className += 'bg-green-200 text-green-900 font-medium';
                } else if (targetRatio && num > (targetRatio * 100)) {
                    className += 'bg-purple-300 font-bold';
                } else if (num >= 90) {
                    className += 'bg-yellow-200';
                } else {
                    className += 'bg-red-200';
                }
            }
            else if (['RSVP(ACB)', 'RSVP(ICB)', 'View', 'Book(ACB)', 'Book(ICB)', 'Show', 'Sign'].includes(colName)) {

            }

                    const hue = ratio * 120; // 0 is Red, 120 is Green
                    style.backgroundColor = `hsl(${hue}, 80%, 85%)`;
                } else if (range && range.max === range.min && range.max > 0) {
                    style.backgroundColor = `hsl(120, 80%, 85%)`; 
                }
            }

            return { className, style };
        };

        function getDynamicIndex(headers, searchTerms, fallbackIndex) {
            for (let i = 0; i < headers.length; i++) {
                const h = (headers[i] || '').replace(/[\r\n]+/g, ' ').replace(/"/g, '').trim().toLowerCase();
                if (searchTerms.some(term => h === term.toLowerCase())) {
                    return i;
                }
            }
            for (let i = 0; i < headers.length; i++) {
                const h = (headers[i] || '').replace(/[\r\n]+/g, ' ').replace(/"/g, '').trim().toLowerCase();
                if (searchTerms.some(term => h.includes(term.toLowerCase()))) {
                    return i;
                }
            }
            return fallbackIndex;
        }

            if (formatType === 'percent-raw') return val.toFixed(1) + '%'; // Added raw percent format without *100
            if (formatType === 'number') return val.toLocaleString();
            return val;

                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },

                    const prompt = `You are an expert sales analyst for a beauty/wellness clinic analyzing the 'Shanghai Girls Collagen Festival' campaign.

                        return row;
                    });

                    const finalHeaders = extractedHeaders.map((h, i) => h || `Col ${i + 1}`);

                    setHeaders(finalHeaders);
                    setData(filledData);
                    setLastSyncTime(new Date());
                    setError(null);

                } catch (err) {
                    setError(err.message);
                    setLastSyncTime(new Date());
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchData();
                const intervalId = setInterval(fetchData, 5 * 60 * 1000); 
                return () => clearInterval(intervalId); 
            }, [fetchData]);

            const activeKPIs = useMemo(() => {
                if (!colMap) return [];
                
                return [
                    { id: 'cb1', index: colMap.cb1, name: 'ACB', format: 'number', headerClass: 'bg-cyan-100 text-cyan-900 border-t border-cyan-200' },
                    { id: 'cb2', index: colMap.cb2, name: 'ICB', format: 'number', headerClass: 'bg-cyan-100 text-cyan-900 border-t border-cyan-200' },

                    { id: 'targetMonth', index: colMap.targetMonth, name: '本月目標$$', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'totalSalesMonth', index: colMap.totalSalesMonth, name: '本月總業績$$', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'mtdPercent', index: colMap.mtdPercent, name: 'MTD%', format: 'percent-raw', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'turnLightMissing', index: colMap.turnLightMissing, name: '轉燈尚欠$$', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'todaySales', index: colMap.todaySales, name: '今日銷售額', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },

                    { id: 'futureICB', index: colMap.futureICB, name: '未來 ICB Booking', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
                    { id: 'yesterdayShow', index: colMap.yesterdayShow, name: '昨天SHOW', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
                    { id: 'yesterdayShowICB', index: colMap.yesterdayShowICB, name: '昨天SHOW (ICB)', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },

                    { id: 'node', index: colMap.node, name: '分發點總數', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
                    { id: 'mauPercent', index: colMap.mauPercent, name: 'MAU %', format: 'percent-raw', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' }, // Updated format here
                    { id: 'node3Days', index: colMap.node3Days, name: '3天增加', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
                    
                    { id: 'trialTodayMain', index: colMap.trialTodayMain, name: '體驗療程開單(今天)', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'trialTodayBracket', index: colMap.trialTodayBracket, name: '今天 PT QTY', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'packageTodayMain', index: colMap.packageTodayMain, name: '套餐 (Package)開單(今天)', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'packageTodayBracket', index: colMap.packageTodayBracket, name: '今天 Full course', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'penetrationRate', index: colMap.penetrationRate, name: '滲透率%', format: 'percent-raw', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    
                    { id: 'bdayBook', index: colMap.bdayBook, name: '生日 Giftcard Book', format: 'number', headerClass: 'bg-yellow-100 text-yellow-900 border-t border-yellow-200' },
                    { id: 'bdayDelta', index: colMap.bdayDelta, name: '生日 Giftcard 三天增加', format: 'number', headerClass: 'bg-yellow-100 text-yellow-900 border-t border-yellow-200' },
                    { id: 'plasmaBook', index: colMap.plasmaBook, name: 'Plasma Giftcard Book', format: 'number', headerClass: 'bg-yellow-100 text-yellow-900 border-t border-yellow-200' },
                    { id: 'plasmaDelta', index: colMap.plasmaDelta, name: 'Plasma Giftcard 三天增加', format: 'number', headerClass: 'bg-yellow-100 text-yellow-900 border-t border-yellow-200' },

                    { id: 'liveAB', index: colMap.liveAB, name: 'RSVP(ACB)', format: 'number', headerClass: 'bg-fuchsia-100 text-fuchsia-900 border-t border-fuchsia-200' },
                    { id: 'liveAC', index: colMap.liveAC, name: 'RSVP(ICB)', format: 'number', headerClass: 'bg-fuchsia-100 text-fuchsia-900 border-t border-fuchsia-200' },
                    { id: 'liveView', index: colMap.liveView, name: 'View', format: 'number', headerClass: 'bg-fuchsia-100 text-fuchsia-900 border-t border-fuchsia-200' },
                    { id: 'liveAD', index: colMap.liveAD, name: 'Book(ACB)', format: 'number', headerClass: 'bg-fuchsia-100 text-fuchsia-900 border-t border-fuchsia-200' },
                    { id: 'liveAE', index: colMap.liveAE, name: 'Book(ICB)', format: 'number', headerClass: 'bg-fuchsia-100 text-fuchsia-900 border-t border-fuchsia-200' },
                    { id: 'liveAF', index: colMap.liveAF, name: 'Show', format: 'number', headerClass: 'bg-fuchsia-100 text-fuchsia-900 border-t border-fuchsia-200' },
                    { id: 'liveAG', index: colMap.liveAG, name: 'Sign', format: 'number', headerClass: 'bg-fuchsia-100 text-fuchsia-900 border-t border-fuchsia-200' }
                ].map(kpi => ({
                    ...kpi,
                    displayName: (headers[kpi.index] && headers[kpi.index].trim() !== '') ? headers[kpi.index].replace(/[\r\n]+/g, ' ').replace(/"/g, '') : kpi.name
                }));
            }, [colMap, headers]);

            const brands = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                return ['All', ...new Set(validRows.map(r => r[colMap.brand]).filter(Boolean))];
            }, [data, colMap]);

            const centers = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                const brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[colMap.brand] === selectedBrand);
                return ['All', ...new Set(brandFiltered.map(r => r[colMap.center]).filter(Boolean))];
            }, [data, selectedBrand, colMap]);

            const therapists = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                let brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[colMap.brand] === selectedBrand);
                let centerFiltered = selectedCenter === 'All' ? brandFiltered : brandFiltered.filter(r => r[colMap.center] === selectedCenter);
                return ['All', ...new Set(centerFiltered.map(r => r[colMap.therapist]).filter(Boolean))];
            }, [data, selectedBrand, selectedCenter, colMap]);

            const bsList = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                let brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[colMap.brand] === selectedBrand);
                let centerFiltered = selectedCenter === 'All' ? brandFiltered : brandFiltered.filter(r => r[colMap.center] === selectedCenter);
                let therapistFiltered = selectedTherapist === 'All' ? centerFiltered : centerFiltered.filter(r => r[colMap.therapist] === selectedTherapist);
                return ['All', ...new Set(therapistFiltered.map(r => r[colMap.bs]).filter(Boolean))];
            }, [data, selectedBrand, selectedCenter, selectedTherapist, colMap]);

            const processedData = useMemo(() => {
                if (!colMap || activeKPIs.length === 0) return [];
                
                const lowerSearch = searchTerm.toLowerCase();
                let result = [];

                for (let idx = 0; idx < data.length; idx++) {
                    const row = data[idx];
                    if (row[colMap.center] === 'Grand Total') continue;
                    if (selectedBrand !== 'All' && row[colMap.brand] !== selectedBrand) continue;
                    if (selectedCenter !== 'All' && row[colMap.center] !== selectedCenter) continue;
                    if (selectedTherapist !== 'All' && row[colMap.therapist] !== selectedTherapist) continue;
                    if (selectedBS !== 'All' && row[colMap.bs] !== selectedBS) continue;
                    if (searchTerm && !row.join(' ').toLowerCase().includes(lowerSearch)) continue;

                    let mapped = {
                        id: `row-${idx}`, 
                        Brand: row[colMap.brand] || 'Unknown', 
                        Center: row[colMap.center] || 'Unknown',
                        Therapist: row[colMap.therapist] || '', 
                        BS: row[colMap.bs] || '',
                        raw: row
                    };
                    
                    for (const kpi of activeKPIs) {
                        mapped[kpi.id] = parseNumber(row[kpi.index]);
                    }
                    result.push(mapped);
                }

                if (sortConfig.key) {
                    result.sort((a, b) => {
                        const valA = a[sortConfig.key];
                        const valB = b[sortConfig.key];
                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [data, searchTerm, selectedBrand, selectedCenter, selectedTherapist, selectedBS, sortConfig, activeKPIs, colMap]);

            const colRanges = useMemo(() => {
                const ranges = {};
                if (!activeKPIs) return ranges;
                
                ['今天 Full course', '體驗療程開單 (今天)', 'MAU %', '滲透率%'].forEach(colName => {
                    const kpi = activeKPIs.find(c => c.name === colName);
                    if (kpi) {
                        const vals = processedData.map(r => r[kpi.id]).filter(v => typeof v === 'number' && !isNaN(v));
                        ranges[colName] = {
                            min: vals.length ? Math.min(...vals) : 0,
                            max: vals.length ? Math.max(...vals) : 100
                        };
                    }
                });
                return ranges;
            }, [processedData, activeKPIs]);

            // Event Handlers
            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') {
                    direction = 'desc';
                }
                setSortConfig({ key, direction });
            };

            const exportToCSV = () => {
                if (!processedData.length) return;
                
                const baseKeys = ['Brand', 'Center', 'Therapist', 'BS'];
                const kpiKeys = activeKPIs.map(k => k.id);
                const allKeys = [...baseKeys, ...kpiKeys];
                
                const headerRow = [...baseKeys, ...activeKPIs.map(k => k.displayName)];
                
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headerRow.join(",") + "\n";
                
                processedData.forEach(row => {
                    const rowData = allKeys.map(key => {
                        let cell = row[key];
                        if (cell === null || cell === undefined) cell = '';
                        // Format specifically for CSV slightly differently if needed, 
                        // but raw values are usually better for exports. We'll use raw values.
                        cell = String(cell).replace(/"/g, '""');
                        return `"${cell}"`;
                    });
                    csvContent += rowData.join(",") + "\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `shanghai_girls_festival_${new Date().getTime()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Summary Card Component
            const SummaryCard = ({ title, value, icon: Icon, colorClass }) => (
                <div className={`bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center gap-4 ${colorClass || ''}`}>
                    <div className="p-3 bg-indigo-50 text-indigo-600 rounded-lg">
                        {Icon}
                    </div>
                    <div>
                        <p className="text-sm text-gray-500 font-medium">{title}</p>
                        <h3 className="text-xl font-bold text-gray-900 mt-1">{value}</h3>
                    </div>
                </div>
            );

            if (error) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-xl shadow-lg p-6 max-w-md w-full text-center">
                            <AlertCircle className="w-12 h-12 text-red-500 mx-auto mb-4" />
                            <h2 className="text-xl font-bold text-gray-900 mb-2">Error Loading Data</h2>
                            <p className="text-gray-600">{error}</p>
                            <button onClick={fetchData} className="mt-6 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 flex items-center justify-center gap-2 w-full">
                                <RefreshCw className="w-4 h-4" /> Try Again
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f8fafc] pb-10">
                    {/* Header */}
                    <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-30">
                        <div className="max-w-screen-3xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-indigo-600 rounded-lg text-white">
                                        <Skyline className="w-6 h-6" />
                                    </div>
                                    <h1 className="text-xl font-bold text-gray-900 hidden sm:block">上海少女膠原節：實時成績</h1>
                                    <h1 className="text-xl font-bold text-gray-900 sm:hidden">實時成績</h1>
                                </div>
                                <div className="flex items-center gap-4">
                                    {lastSyncTime && (
                                        <span className="text-xs text-gray-500 hidden md:block">
                                            最後更新: {formatDateToYMD(lastSyncTime)}
                                        </span>
                                    )}
                                    <button 
                                        onClick={fetchData} 
                                        disabled={loading}
                                        className="p-2 text-gray-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors flex items-center gap-2"
                                        title="Refresh Data"
                                    >
                                        <RefreshCw className={`w-5 h-5 ${loading ? 'animate-spin text-indigo-600' : ''}`} />
                                        <span className="text-sm font-medium hidden sm:block">{loading ? 'Updating...' : 'Refresh'}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {/* Summary Top Cards */}
                        {grandTotalRow && colMap && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                <SummaryCard 
                                    title="本月總業績" 
                                    value={formatShortCurrency(parseNumber(grandTotalRow[colMap.totalSalesMonth]))} 
                                    icon={<TrendingUp className="w-6 h-6" />} 
                                />
                                <SummaryCard 
                                    title="今日銷售額" 
                                    value={formatShortCurrency(parseNumber(grandTotalRow[colMap.todaySales]))} 
                                    icon={<Zap className="w-6 h-6" />} 
                                />
                                <SummaryCard 
                                    title="體驗療程開單(今天)" 
                                    value={parseNumber(grandTotalRow[colMap.trialTodayMain]).toLocaleString()} 
                                    icon={<Gift className="w-6 h-6" />} 
                                />
                                <SummaryCard 
                                    title="未來 ICB Booking" 
                                    value={parseNumber(grandTotalRow[colMap.futureICB]).toLocaleString()} 
                                    icon={<CalendarCheck className="w-6 h-6" />} 
                                />
                            </div>
                        )}

                        {/* Filters and Controls */}
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 mb-6 p-4">
                            <div className="flex flex-col xl:flex-row gap-4 justify-between items-start xl:items-center">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 w-full xl:w-auto flex-1">
                                    <div className="relative">
                                        <Search className="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" />
                                        <input
                                            type="text"
                                            placeholder="Search anything..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            className="w-full pl-9 pr-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
                                        />
                                    </div>
                                    <select
                                        value={selectedBrand}
                                        onChange={(e) => setSelectedBrand(e.target.value)}
                                        className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white"
                                    >
                                        <option value="All">All Brands</option>
                                        {brands.filter(b => b !== 'All').map(brand => (
                                            <option key={brand} value={brand}>{brand}</option>
                                        ))}
                                    </select>
                                    <select
                                        value={selectedCenter}
                                        onChange={(e) => setSelectedCenter(e.target.value)}
                                        className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white"
                                    >
                                        <option value="All">All Centers</option>
                                        {centers.filter(c => c !== 'All').map(center => (
                                            <option key={center} value={center}>{center}</option>
                                        ))}
                                    </select>
                                    <select
                                        value={selectedTherapist}
                                        onChange={(e) => setSelectedTherapist(e.target.value)}
                                        className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white"
                                    >
                                        <option value="All">All Therapists</option>
                                        {therapists.filter(t => t !== 'All').map(therapist => (
                                            <option key={therapist} value={therapist}>{therapist}</option>
                                        ))}
                                    </select>
                                    <select
                                        value={selectedBS}
                                        onChange={(e) => setSelectedBS(e.target.value)}
                                        className="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white"
                                    >
                                        <option value="All">All BS</option>
                                        {bsList.filter(b => b !== 'All').map(bs => (
                                            <option key={bs} value={bs}>{bs}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="flex items-center gap-3 w-full xl:w-auto">
                                    <button 
                                        onClick={generateInsights}
                                        className="flex-1 xl:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-purple-50 text-purple-700 border border-purple-200 rounded-lg text-sm font-medium hover:bg-purple-100 transition-colors"
                                    >
                                        <Sparkles className="w-4 h-4" /> AI Insights
                                    </button>
                                    <button 
                                        onClick={exportToCSV}
                                        className="flex-1 xl:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg text-sm font-medium hover:bg-emerald-100 transition-colors"
                                    >
                                        <Download className="w-4 h-4" /> Export CSV
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Data Table */}
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="overflow-x-auto" style={{ maxHeight: 'calc(100vh - 350px)' }}>
                                {loading && processedData.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-20">
                                        <RefreshCw className="w-8 h-8 text-indigo-500 animate-spin mb-4" />
                                        <p className="text-gray-500 font-medium">Loading live data...</p>
                                    </div>
                                ) : (
                                    <table className="w-full text-sm text-left whitespace-nowrap">
                                        <thead className="text-xs uppercase bg-gray-100 sticky top-0 z-20 shadow-sm">
                                            <tr>
                                                <th 
                                                    className="px-4 py-4 text-gray-700 cursor-pointer hover:bg-gray-200 sticky left-0 z-30 bg-gray-100 font-semibold w-[100px] min-w-[100px] max-w-[100px] truncate"
                                                    onClick={() => handleSort('Brand')}
                                                >
                                                    <div className="flex items-center gap-1">Brand {sortConfig.key === 'Brand' && (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3"/> : <ChevronDown className="w-3 h-3"/>)}</div>
                                                </th>
                                                <th 
                                                    className="px-4 py-4 text-gray-700 cursor-pointer hover:bg-gray-200 sticky left-[100px] z-30 bg-gray-100 border-r border-gray-200 font-semibold w-[120px] min-w-[120px] max-w-[120px] truncate"
                                                    onClick={() => handleSort('Center')}
                                                >
                                                    <div className="flex items-center gap-1">Center {sortConfig.key === 'Center' && (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3"/> : <ChevronDown className="w-3 h-3"/>)}</div>
                                                </th>
                                                <th 
                                                    className="px-4 py-4 text-gray-700 cursor-pointer hover:bg-gray-200 sticky left-[220px] z-30 bg-gray-100 font-semibold w-[140px] min-w-[140px] max-w-[140px] truncate" 
                                                    onClick={() => handleSort('Therapist')}
                                                >
                                                    <div className="flex items-center gap-1">Therapist {sortConfig.key === 'Therapist' && (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3"/> : <ChevronDown className="w-3 h-3"/>)}</div>
                                                </th>
                                                <th 
                                                    className="px-4 py-4 text-gray-700 cursor-pointer hover:bg-gray-200 sticky left-[360px] z-30 bg-gray-100 border-r-2 border-gray-300 font-semibold w-[80px] min-w-[80px] max-w-[80px] truncate shadow-[4px_0_6px_-2px_rgba(0,0,0,0.1)]" 
                                                    onClick={() => handleSort('BS')}
                                                >
                                                    <div className="flex items-center gap-1">BS {sortConfig.key === 'BS' && (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3"/> : <ChevronDown className="w-3 h-3"/>)}</div>
                                                </th>

                                                {/* Dynamic KPIs Headers */}
                                                {activeKPIs.map(kpi => (
                                                    <th 
                                                        key={kpi.id} 
                                                        className={`px-3 py-4 cursor-pointer hover:opacity-90 font-semibold ${kpi.headerClass}`}
                                                        onClick={() => handleSort(kpi.id)}
                                                    >
                                                        <div className="flex items-center gap-1 justify-end">
                                                            {kpi.displayName}
                                                            {sortConfig.key === kpi.id && (sortConfig.direction === 'asc' ? <ChevronUp className="w-3 h-3"/> : <ChevronDown className="w-3 h-3"/>)}
                                                        </div>
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {processedData.length > 0 ? (
                                                processedData.map((row, index) => (
                                                    <tr key={row.id} className={`transition-colors ${index % 2 === 0 ? 'bg-white' : 'bg-[#f9fafb]'} hover:bg-indigo-50`}>
                                                        <td className="px-4 py-3 font-medium text-gray-900 sticky left-0 z-10 bg-inherit border-r border-gray-100 w-[100px] min-w-[100px] max-w-[100px] truncate" title={row.Brand}>
                                                            {row.Brand}
                                                        </td>
                                                        <td className="px-4 py-3 sticky left-[100px] z-10 bg-inherit border-r border-gray-200 w-[120px] min-w-[120px] max-w-[120px] truncate" title={row.Center}>
                                                            <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800 truncate max-w-full">
                                                                {row.Center}
                                                            </span>
                                                        </td>
                                                        <td className="px-4 py-3 text-gray-600 sticky left-[220px] z-10 bg-inherit border-r border-gray-100 w-[140px] min-w-[140px] max-w-[140px]">
                                                            <div className="flex items-center justify-between gap-1 w-full">
                                                                <span className="truncate" title={row.Therapist}>{row.Therapist}</span>
                                                                {row.Therapist && row.Therapist !== 'Unknown' && (
                                                                    <button 
                                                                        onClick={() => getTherapistCoaching(row)}
                                                                        className="p-1 hover:bg-purple-100 rounded text-purple-600 transition-colors flex-shrink-0"
                                                                        title="Get AI Coaching Tips"
                                                                    >
                                                                        ✨
                                                                    </button>
                                                                )}
                                                            </div>
                                                        </td>
                                                        <td className="px-4 py-3 text-gray-600 sticky left-[360px] z-10 bg-inherit border-r-2 border-gray-300 w-[80px] min-w-[80px] max-w-[80px] truncate shadow-[4px_0_6px_-2px_rgba(0,0,0,0.1)]" title={row.BS}>
                                                            {row.BS}
                                                        </td>
                                                        
                                                        {activeKPIs.map(kpi => {
                                                            const val = row[kpi.id];
                                                            // 傳遞包含該列其他指標的 `row` 以供互相比較 (例如 totalSalesMonth vs targetMonth)
                                                            const { className: condClass, style } = getConditionalFormat(kpi.name, val, mtdTargetRatio, colRanges, row);
                                                            return (
                                                                <td 
                                                                    key={kpi.id} 
                                                                    className={`px-3 py-3 text-right tabular-nums ${condClass}`} 
                                                                    style={style}
                                                                >
                                                                    {formatValue(val, kpi.format)}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))
                                            ) : (
                                                <tr>
                                                    <td colSpan={4 + activeKPIs.length} className="px-4 py-12 text-center text-gray-500">
                                                        <FilterIcon className="w-12 h-12 text-gray-300 mx-auto mb-3" />
                                                        <p className="text-lg font-medium text-gray-900">No matching records found</p>
                                                        <p className="text-sm mt-1">Try adjusting your filters or search term.</p>
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                            <div className="bg-gray-50 px-4 py-3 border-t border-gray-200 text-sm text-gray-500 flex justify-between items-center">
                                <span>Showing <strong>{processedData.length}</strong> records</span>
                            </div>
                        </div>

                        {/* AI Insights Modal */}
                        {isInsightModalOpen && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm">
                                <div className="bg-white rounded-2xl shadow-xl max-w-2xl w-full max-h-[80vh] flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                                    <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-purple-50 to-white">
                                        <div className="flex items-center gap-2 text-purple-800 font-semibold text-lg">
                                            <Sparkles className="w-5 h-5 text-purple-600" />
                                            Campaign AI Insights
                                        </div>
                                        <button onClick={() => setIsInsightModalOpen(false)} className="text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-1 rounded-lg transition-colors">
                                            <XIcon className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <div className="p-6 overflow-y-auto">
                                        {insightLoading ? (
                                            <div className="flex flex-col items-center justify-center py-12 text-purple-600">
                                                <RefreshCw className="w-8 h-8 animate-spin mb-4" />
                                                <p className="font-medium animate-pulse">Analyzing dashboard data...</p>
                                            </div>
                                        ) : (
                                            <div className="prose prose-purple prose-sm max-w-none whitespace-pre-wrap text-gray-700 leading-relaxed">
                                                {insightText}
                                            </div>
                                        )}
                                    </div>
                                    <div className="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                                        <button onClick={() => setIsInsightModalOpen(false)} className="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium text-sm transition-colors">
                                            Close
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* AI Coaching Modal */}
                        {coachingData.open && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm">
                                <div className="bg-white rounded-2xl shadow-xl max-w-md w-full overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                                    <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-indigo-50 to-white">
                                        <div className="flex items-center gap-2 text-indigo-800 font-semibold text-lg">
                                            <Sparkles className="w-5 h-5 text-indigo-600" />
                                            AI Coach: {coachingData.therapist}
                                        </div>
                                        <button onClick={() => setCoachingData(prev => ({ ...prev, open: false }))} className="text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-1 rounded-lg transition-colors">
                                            <XIcon className="w-5 h-5" />
                                        </button>
                                    </div>
                                    <div className="p-6 min-h-[150px] flex flex-col justify-center">
                                        {coachingData.loading ? (
                                            <div className="flex flex-col items-center justify-center text-indigo-600 py-4">
                                                <RefreshCw className="w-6 h-6 animate-spin mb-3" />
                                                <p className="text-sm font-medium animate-pulse">Generating personalized advice...</p>
                                            </div>
                                        ) : (
                                            <div className="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap">
                                                {coachingData.text}
                                            </div>
                                        )}
                                    </div>
                                    <div className="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                                        <button onClick={() => setCoachingData(prev => ({ ...prev, open: false }))} className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium text-sm transition-colors shadow-sm">
                                            Got it
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
